name: CheckNet
options:
  bundleIdPrefix: com.checknet
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  NetworkKit:
    path: Packages/NetworkKit

targets:
  CheckNet:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
    dependencies:
      - package: NetworkKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.checknet.app
        PRODUCT_NAME: CheckNet
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_KEY_CFBundleDisplayName: CheckNet
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "CheckNet сканирует локальную сеть для обнаружения устройств и проверки хостов."
        INFOPLIST_KEY_NSBonjourServices: "_services._dns-sd._udp,_http._tcp,_ssh._tcp"
        MARKETING_VERSION_iOS: "1.0"
