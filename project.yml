name: CheckNet
options:
  bundleIdPrefix: com.chrsnv
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: ru

packages:
  NetworkKit:
    path: Packages/NetworkKit

settings:
  base:
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
    DEVELOPMENT_TEAM: ""

targets:
  CheckNet:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
      - path: Shared
    dependencies:
      - package: NetworkKit
      - target: CheckNetWidgets
        embed: true
        platformFilter: iOS
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: CheckNet
        CFBundleDevelopmentRegion: ru
        CFBundleLocalizations:
          - ru
          - en
          - zh-Hans
          - es
          - fr
          - de
          - ja
          - pt-BR
          - ko
          - it
          - tr
          - ar
          - hi
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.chrsnv.checknet.deeplink
            CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - checknet
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Камера нужна только для сканирования QR-кодов со списком сохранённых хостов. Изображения никуда не отправляются."
        NSLocationWhenInUseUsageDescription: "Доступ к геопозиции нужен только чтобы прочитать имя текущей Wi-Fi-сети — iOS отдаёт SSID лишь с этим разрешением. Координаты не используются и никуда не отправляются."
        NSLocalNetworkUsageDescription: "CheckNet сканирует локальную сеть для обнаружения устройств, Bonjour-сервисов и проверки хостов."
        NSBonjourServices:
          - _services._dns-sd._udp
          - _checknet._tcp
          - _http._tcp
          - _https._tcp
          - _ssh._tcp
          - _sftp-ssh._tcp
          - _smb._tcp
          - _afpovertcp._tcp
          - _airplay._tcp
          - _raop._tcp
          - _googlecast._tcp
          - _ipp._tcp
          - _ipps._tcp
          - _printer._tcp
          - _homekit._tcp
          - _hap._tcp
          - _spotify-connect._tcp
          - _device-info._tcp
          - _companion-link._tcp
          - _rfb._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet
        PRODUCT_NAME: CheckNet
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        # Extract Text("…") keys into Localizable.xcstrings on every build.
        # With this off the catalog silently drifted: new UI shipped with keys
        # that were never in the catalogue, so they could never be translated.
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: App/CheckNet.entitlements
        # macOS needs the sandbox + networking entitlements, which iOS neither
        # has nor accepts — hence a separate file per SDK.
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: App/CheckNet-macOS.entitlements
    # The UI tests are deliberately absent here: they are iOS-only, and a scheme
    # that lists them cannot be tested against the macOS destination — xcodebuild
    # still builds every test target in the scheme, and an iOS bundle built with
    # the ad-hoc identity the Mac run passes is rejected outright by the iOS SDK.
    # They get their own scheme below.
    scheme:
      testTargets:
        - CheckNetTests

  # Logic tests for the code under Shared/. Those sources are compiled straight
  # into the bundle rather than linked from the app, so the tests need no host
  # application and run on both destinations.
  CheckNetTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests/CheckNetTests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet.tests
        PRODUCT_NAME: CheckNetTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES

  # UI tests exist for one reason: landscape size classes only change when a
  # device really rotates, which no unit test can do.
  CheckNetUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CheckNetUITests
    dependencies:
      - target: CheckNet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet.uitests
        PRODUCT_NAME: CheckNetUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: CheckNet

  CheckNetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: CheckNet
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet.widgets
        PRODUCT_NAME: CheckNetWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widgets/CheckNetWidgets.entitlements

# A scheme of its own, so the app scheme stays testable on macOS while these
# iOS-only tests keep a simulator destination.
schemes:
  CheckNetUITests:
    build:
      targets:
        CheckNet: [test]
        CheckNetUITests: [test]
    test:
      targets:
        - CheckNetUITests
