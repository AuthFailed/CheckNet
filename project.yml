name: CheckNet
options:
  bundleIdPrefix: com.chrsnv
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  NetworkKit:
    path: Packages/NetworkKit

settings:
  base:
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
    DEVELOPMENT_TEAM: ""

targets:
  CheckNet:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
      - path: Shared
    dependencies:
      - package: NetworkKit
      - target: CheckNetWidgets
        embed: true
        platformFilter: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet
        PRODUCT_NAME: CheckNet
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: App/CheckNet.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: CheckNet
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "CheckNet сканирует локальную сеть для обнаружения устройств и проверки хостов."
        INFOPLIST_KEY_NSBonjourServices: "_services._dns-sd._udp,_http._tcp,_ssh._tcp"

  CheckNetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: CheckNet
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet.widgets
        PRODUCT_NAME: CheckNetWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widgets/CheckNetWidgets.entitlements
