name: CheckNet
options:
  bundleIdPrefix: com.chrsnv
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  NetworkKit:
    path: Packages/NetworkKit

settings:
  base:
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: YES
    DEVELOPMENT_TEAM: ""

targets:
  CheckNet:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
      - path: Shared
    dependencies:
      - package: NetworkKit
      - target: CheckNetWidgets
        embed: true
        platformFilter: iOS
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: CheckNet
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "CheckNet сканирует локальную сеть для обнаружения устройств, Bonjour-сервисов и проверки хостов."
        NSBonjourServices:
          - _services._dns-sd._udp
          - _checknet._tcp
          - _http._tcp
          - _https._tcp
          - _ssh._tcp
          - _sftp-ssh._tcp
          - _smb._tcp
          - _afpovertcp._tcp
          - _airplay._tcp
          - _raop._tcp
          - _googlecast._tcp
          - _ipp._tcp
          - _ipps._tcp
          - _printer._tcp
          - _homekit._tcp
          - _hap._tcp
          - _spotify-connect._tcp
          - _device-info._tcp
          - _companion-link._tcp
          - _rfb._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet
        PRODUCT_NAME: CheckNet
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: App/CheckNet.entitlements

  CheckNetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: CheckNet
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrsnv.checknet.widgets
        PRODUCT_NAME: CheckNetWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Widgets/CheckNetWidgets.entitlements
