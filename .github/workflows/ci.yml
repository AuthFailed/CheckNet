name: CI

# Runs on manual dispatch, on pushes to main and any branch, and on PRs to main.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (SwiftPM + iOS app)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            Packages/NetworkKit/.build
            ~/.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Packages/NetworkKit/Package.resolved', 'Packages/NetworkKit/Package.swift') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Build NetworkKit (SwiftPM core)
        run: swift build --package-path Packages/NetworkKit

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project CheckNet.xcodeproj \
            -scheme CheckNet \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  build-macos:
    name: Build (macOS app)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # The Mac app is signed ad-hoc: it carries the sandbox and networking
      # entitlements, which automatic signing would demand a team for.
      - name: Build app (macOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project CheckNet.xcodeproj \
            -scheme CheckNet \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            build

  unit-tests:
    name: Unit tests (offline, blocking)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            Packages/NetworkKit/.build
            ~/.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Packages/NetworkKit/Package.resolved', 'Packages/NetworkKit/Package.swift') }}
          restore-keys: swiftpm-${{ runner.os }}-

      # Deterministic tests only — parsers, encoders, catalogues, local-server
      # webhook delivery. This job is the gate: it must never be flaky, so a red
      # cross here always means the change broke something.
      # A translation whose format specifiers disagree with its key crashes at
      # format time, in that language only — so it survives any amount of
      # testing done in Russian. Cheap to check, expensive to ship.
      - name: Validate string catalog
        run: python3 Scripts/check_string_catalog.py

      - name: Run deterministic tests
        env:
          CHECKNET_SKIP_NETWORK_TESTS: "1"
        run: swift test --package-path Packages/NetworkKit

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # App-layer logic tests (Shared/). No network and no host app, so they run
      # on the macOS destination — no simulator to boot and no device name that
      # can vanish from a runner image.
      - name: Run app tests
        run: |
          set -o pipefail
          xcodebuild \
            -project CheckNet.xcodeproj \
            -scheme CheckNet \
            -destination 'platform=macOS' \
            -only-testing:CheckNetTests \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            test

      # Landscape size classes only change when a device really rotates, so this
      # one needs a simulator rather than the macOS destination.
      #
      # The simulator is resolved by udid instead of by name: which iPhones the
      # runner image ships changes over time, and a name that is missing does not
      # fail loudly — xcodebuild falls back to the device SDK and dies on code
      # signing, which reads like a signing problem rather than a missing device.
      # A "Max" is preferred because it is the phone that reports a regular
      # horizontal size class in landscape, which is the case under test.
      - name: Run landscape UI tests
        run: |
          set -o pipefail
          UDID=$(xcrun simctl list devices available --json | python3 -c '
import json, sys
phones = [d for runtime in json.load(sys.stdin)["devices"].values()
          for d in runtime if d["name"].startswith("iPhone")]
if not phones:
    sys.exit("no iPhone simulator on this runner")
phones.sort(key=lambda d: "Max" not in d["name"])
print(phones[0]["udid"])
')
          xcodebuild \
            -project CheckNet.xcodeproj \
            -scheme CheckNet \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:CheckNetUITests \
            CODE_SIGNING_ALLOWED=NO \
            test

  network-tests:
    name: Network tests (live hosts, informational)
    runs-on: macos-latest
    # A hosted runner filters ICMP and reaches third-party hosts unreliably, so
    # a failure here is a signal to investigate, not a reason to block a PR.
    # The real gate for network checks stays a local `swift test` run.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            Packages/NetworkKit/.build
            ~/.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Packages/NetworkKit/Package.resolved', 'Packages/NetworkKit/Package.swift') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Run the full suite against real hosts
        run: swift test --package-path Packages/NetworkKit

  lint:
    name: Lint & optimization (SwiftLint)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  security:
    name: Security scan (CodeQL)
    runs-on: macos-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build for CodeQL
        run: |
          set -o pipefail
          xcodegen generate
          xcodebuild \
            -project CheckNet.xcodeproj \
            -scheme CheckNet \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
